font_family      Maple Mono NF
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0

# 优化渲染，减少锯齿
text_composition_strategy legacy


# 窗口边距
window_padding_width 0

# 透明度 (0.0 - 1.0)
background_opacity 0.95
background_blur 0

# 隐藏标题栏 (Wayland/macOS 效果较好)
hide_window_decorations no

# 记住窗口大小
remember_window_size  no
initial_window_width  1100
initial_window_height 800

# 降低输入延迟
input_delay 2

# 限制重绘频率，减轻 CPU/GPU 负担
repaint_delay 8

# 同步屏幕刷新，防止画面撕裂
sync_to_monitor yes

# 滚屏缓冲区行数
scrollback_lines 10000

# 鼠标自动隐藏
mouse_hide_wait 3.0

# 点击链接时使用的程序
open_url_with default

# 复制到剪贴板
copy_on_select yes
