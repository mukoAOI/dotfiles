# Limine 配置文件 - Gentoo Linux
TIMEOUT=30
# 默认启动项，可以是编号（从1开始）或条目名称
DEFAULT_ENTRY=1
# DEFAULT_ENTRY=gentoo
wallpaper: boot():/background/back1.jpg
wallpaper_style: tiled

/+linux
//gentoo
    protocol:linux
    comment:Gentoo Linux (kernel 7.0.9)

    # 内核路径（假设 /boot 为独立分区，且 Limine 从该分区加载）
    kernel_path:boot():/kernel-7.0.9-gentoo-dist

    # 首先加载 AMD 微码，再加载主 initramfs
    module_path:boot():/amd-uc.img
    module_path:boot():/initramfs-7.0.9-gentoo-dist.img

    # 内核命令行参数，对应原来 GRUB 的 GRUB_CMDLINE_LINUX_DEFAULT
    kernel_cmdline:loglevel=4 nowatchdog root=UUID= rootflags=subvol=/@

    # 如果根分区未被 initramfs 自动识别，请添加 root= 参数（例如 root=PARTUUID=xxxxxxxx）
    # KERNEL_CMDLINE=loglevel=4 nowatchdog root=PARTUUID=<你的根分区UUID>

/+windows
//windows11
    protocol:uefi
    comment:Windows Boot Manager
    # 使用 ESP 分区的 UUID 指定路径
    PATH:boot():/EFI/Microsoft/Boot/bootmgfw.efi
